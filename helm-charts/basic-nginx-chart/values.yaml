replicaCount: 2
namespace: <+pipeline.stages.cs1.spec.execution.steps.ShellScript_1.output.outputVariables.rishi2>
image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8443
      name: https
    - port: 960
      targetPort: 9000
      name: api
